<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intrusion Detection System Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #0a0e17;
            --bg-panel: rgba(16, 24, 40, 0.7);
            --accent-cyan: #00f0ff;
            --alert-red: #ff4c4c;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --border-glow: rgba(0, 240, 255, 0.3);
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #ffffff;
            text-shadow: 0 0 15px var(--accent-cyan);
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header p {
            color: var(--accent-cyan);
            font-size: 1.1rem;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .panel-title {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        /* Live Event Feed */
        .event-feed {
            height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .event-feed::-webkit-scrollbar {
            width: 6px;
        }
        .event-feed::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        .event-card {
            background: rgba(0,0,0,0.4);
            border-left: 4px solid var(--accent-cyan);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 6px;
            font-family: 'Source Code Pro', monospace;
            font-size: 0.9rem;
            animation: slideIn 0.4s ease-out;
            transition: 0.3s opacity, 0.3s border-color;
        }

        .event-card.malicious {
            border-left-color: var(--alert-red);
            background: linear-gradient(90deg, rgba(255,76,76,0.1) 0%, rgba(0,0,0,0.4) 100%);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            align-items: center;
        }

        .pid-badge {
            background: rgba(255,255,255,0.1);
            padding: 3px 8px;
            border-radius: 4px;
            color: #fff;
            margin-left: 10px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .event-card.safe .status-badge {
            background: rgba(0, 240, 255, 0.1);
            color: var(--accent-cyan);
        }

        .event-card.malicious .status-badge {
            background: rgba(255, 76, 76, 0.1);
            color: var(--alert-red);
        }

        .syscall-trace {
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Stats Section */
        .stat-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
        }

        .stat-box.alert {
            border-color: rgba(255, 76, 76, 0.3);
        }

        .stat-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
            font-family: 'Source Code Pro', monospace;
        }

        .stat-box.safe .stat-value {
            color: #00ff9d;
            text-shadow: 0 0 15px rgba(0, 255, 157, 0.4);
        }

        .stat-box.alert .stat-value {
            color: var(--alert-red);
            text-shadow: 0 0 15px rgba(255, 76, 76, 0.4);
        }

        /* System Status Node */
        .sys-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: var(--accent-cyan);
            margin-bottom: 20px;
        }

        .pulse {
            width: 12px;
            height: 12px;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-cyan);
            animation: pulse 1.5s infinite;
        }

        /* Interactive Kill Button */
        .kill-btn {
            background: var(--alert-red);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            transition: 0.2s all ease-in-out;
            margin-left: 15px;
            letter-spacing: 1px;
        }

        .kill-btn:hover {
            background: #ff1a1a;
            box-shadow: 0 0 15px var(--alert-red);
            transform: scale(1.05);
        }

        .kill-btn:active {
            transform: scale(0.95);
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeInDown {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>IDS Neural Engine</h1>
        <p>Real-Time System Call Intrusion Monitoring</p>
    </div>

    <div class="dashboard-grid">
        <!-- Event Log Panel -->
        <div class="glass-panel">
            <h2 class="panel-title">Live Kernel Traces</h2>
            <div class="event-feed" id="eventList">
                <!-- Events populated by JS -->
            </div>
        </div>

        <!-- Right Column (Analytics & Graph) -->
        <div>
            <!-- Status Node -->
            <div class="glass-panel" style="margin-bottom: 20px;">
                <h2 class="panel-title">System Status</h2>
                <div class="sys-status">
                    <div class="pulse" id="sysPulse"></div>
                    <span id="sysStatus">CONNECTING...</span>
                </div>
            </div>

            <!-- Threat Probability Live Chart -->
            <div class="glass-panel" style="margin-bottom: 20px;">
                <h2 class="panel-title">Threat Probability Radar</h2>
                <canvas id="threatChart" width="400" height="200"></canvas>
            </div>

            <!-- Analytics -->
            <div class="glass-panel">
                <h2 class="panel-title">Threat Analytics</h2>
                <div class="stat-box safe">
                    <div class="stat-title">Secure Processes</div>
                    <div class="stat-value" id="safeCount">0</div>
                </div>
                <div class="stat-box alert">
                    <div class="stat-title">Anomalies Detected</div>
                    <div class="stat-value" id="maliciousCount">0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let firstLoad = true;

        // Counter Animation Function
        function animateValue(obj, start, end, duration) {
            if(start === end) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // Initialize Chart.js Graph
        const ctx = document.getElementById('threatChart').getContext('2d');
        const threatChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Timestamps
                datasets: [{
                    label: 'Anomaly Probability (%)',
                    data: [],
                    borderColor: '#ff4c4c',
                    backgroundColor: 'rgba(255, 76, 76, 0.2)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 4,
                    pointBackgroundColor: '#ff4c4c'
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { 
                        beginAtZero: true, 
                        max: 100,
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: { color: 'rgba(255, 255, 255, 0.6)' }
                    },
                    x: {
                        grid: { color: 'rgba(255, 255, 255, 0)' },
                        ticks: { color: 'rgba(255, 255, 255, 0.6)' }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#e2e8f0', font: { family: 'Rajdhani', size: 14 } } }
                }
            }
        });

        // Kill Switch Interaction
        function terminatePID(btn, pid) {
            // Visual Update ONLY to avoid actually crashing the user's OS processes
            btn.innerText = "TERMINATED";
            btn.style.background = "var(--text-muted)";
            btn.style.borderColor = "transparent";
            btn.style.boxShadow = "none";
            btn.className = ""; // Remove hover effects
            btn.disabled = true;

            // Fade out the malicious row to show it was dealt with
            const card = btn.closest('.event-card');
            card.style.opacity = "0.5";
            card.style.borderLeftColor = "var(--text-muted)";
            card.querySelector('.status-badge').innerText = "CONTAINED";
            card.querySelector('.status-badge').style.background = "rgba(100, 116, 139, 0.2)";
            card.querySelector('.status-badge').style.color = "var(--text-muted)";

            // Sweet Alert Native
            alert(`[DEFENSE MECHANISM ACTIVATED]\n\nMalicious Process PID: ${pid} has been contained and securely terminated by the Neural Engine.`);
        }

        async function fetchDashboardData() {
            try {
                // Fetch Stats explicitly from the Flask Backend URL overriding CORS
                const statRes = await fetch('/api/stats');
                const statData = await statRes.json();
                const evtRes = await fetch('/api/events');
                const events = await evtRes.json();

                // --- Render Logic ---
                const safeEl = document.getElementById('safeCount');
                const alertEl = document.getElementById('maliciousCount');

                if(parseInt(safeEl.innerText) !== statData.safe) { animateValue(safeEl, parseInt(safeEl.innerText) || 0, statData.safe, 500); }
                if(parseInt(alertEl.innerText) !== statData.malicious) { animateValue(alertEl, parseInt(alertEl.innerText) || 0, statData.malicious, 500); }

                // Update System Status
                const sysStatus = document.getElementById('sysStatus');
                const sysPulse = document.getElementById('sysPulse');

                if(statData.status.includes("ACTIVE") || statData.status.includes("GENERATING")) {
                    sysStatus.innerText = statData.status;
                    sysStatus.style.color = "var(--accent-cyan)";
                    sysPulse.style.background = "var(--accent-cyan)";
                    sysPulse.style.boxShadow = "0 0 15px var(--accent-cyan)";
                } else {
                    sysStatus.innerText = statData.status;
                    sysStatus.style.color = "var(--alert-red)";
                    sysPulse.style.background = "var(--alert-red)";
                    sysPulse.style.boxShadow = "0 0 15px var(--alert-red)";
                }

                // --- Update Chart Logic ---
                if (events.length > 0) {
                    const latestEvent = events[0];
                    const timeLabel = latestEvent.timestamp.split(' ')[1] || latestEvent.timestamp;

                    // Only push if the timestamp is completely new
                    if (threatChart.data.labels[threatChart.data.labels.length - 1] !== timeLabel) {
                        threatChart.data.labels.push(timeLabel);
                        threatChart.data.datasets[0].data.push(latestEvent.confidence);

                        // Keep chart to last 15 ticks to prevent overcrowding
                        if(threatChart.data.labels.length > 15) {
                            threatChart.data.labels.shift();
                            threatChart.data.datasets[0].data.shift();
                        }

                        // Dynamically change chart color if threat detected
                        if (latestEvent.prediction === "MALICIOUS") {
                            threatChart.data.datasets[0].borderColor = '#ff4c4c'; 
                            threatChart.data.datasets[0].backgroundColor = 'rgba(255, 76, 76, 0.2)';
                            threatChart.data.datasets[0].pointBackgroundColor = '#ff4c4c';
                        } else {
                            // Turn Cyan if everything is safe recently
                            threatChart.data.datasets[0].borderColor = '#00f0ff'; 
                            threatChart.data.datasets[0].backgroundColor = 'rgba(0, 240, 255, 0.1)';
                            threatChart.data.datasets[0].pointBackgroundColor = '#00f0ff';
                        }

                        threatChart.update();
                    }
                }

                // Render Events
                const list = document.getElementById('eventList');
                if(firstLoad) { list.innerHTML = ""; firstLoad = false; }

                list.innerHTML = "";
                events.forEach(evt => {
                    const card = document.createElement('div');
                    card.className = `event-card ${evt.prediction.toLowerCase()}`;

                    const isMalicious = evt.prediction === "MALICIOUS";
                    const statusText = isMalicious ? "THREAT DETECTED" : "NORMAL";

                    card.innerHTML = `
                        <div class="card-header">
                            <div>
                                <span style="color:var(--text-muted)">[${evt.timestamp.split(' ')[1] || evt.timestamp}]</span> 
                                <span class="pid-badge">PID: ${evt.pid} 
                                    <span style="color: var(--accent-cyan); font-size: 0.8rem;">[${evt.app_name}]</span>
                                </span>
                            </div>
                            <div style="display:flex; align-items:center;">
                                <div class="status-badge">${statusText} - ${evt.confidence}%</div>
                                ${isMalicious ? `<button class="kill-btn" onclick="terminatePID(this, ${evt.pid})">TERMINATE</button>` : ''}
                            </div>
                        </div>
                        <div class="syscall-trace">
                            <span style="color:${isMalicious ? 'var(--alert-red)' : 'var(--accent-cyan)'}">> sys_call:</span> ${evt.sequence_preview}
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (err) {
                console.error("Connection Error:", err);
                const sysStatus = document.getElementById('sysStatus');
                const sysPulse = document.getElementById('sysPulse');
                sysStatus.innerText = "OFFLINE: PYTHON SERVER NOT RUNNING";
                sysStatus.style.color = "var(--alert-red)";
                sysPulse.style.background = "var(--alert-red)";
                sysPulse.style.boxShadow = "0 0 15px var(--alert-red)";
            }
        }

        setInterval(fetchDashboardData, 1500);
        fetchDashboardData();
    </script>
</body>
</html>
