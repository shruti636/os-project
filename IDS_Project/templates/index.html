<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intrusion Detection System Dashboard</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS variables for dynamic themes */
        :root {
            --bg-dark: #07090f;
            --glass-bg: rgba(20, 25, 40, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-cyan: #00f0ff;
            --accent-green: #00ff88;
            --alert-red: #ff2a2a;
            --alert-glow: rgba(255, 42, 42, 0.4);
            --text-main: #e2e8f0;
            --text-muted: #8b949e;
        }

        /* Essential Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 50% 10%, #151a2f 0%, var(--bg-dark) 80%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            overflow: hidden;
        }

        /* Animated Background Elements */
        .bg-grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            perspective: 1000px;
            transform-origin: 50% 100%;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 30px 30px; }
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
        }

        .subtitle {
            font-family: 'Fira Code', monospace;
            color: var(--accent-cyan);
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        /* Main Layout */
        .dashboard-container {
            display: flex;
            gap: 2rem;
            flex: 1;
            height: 100%;
            overflow: hidden;
        }

        /* Glassmorphism Panels */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
        }

        /* Left Panel - Live Feed */
        .left-panel { flex: 2; }
        
        /* Right Panel - Statistics */
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 1.5rem;}

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: white;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        .panel-title .pulse {
            width: 8px; height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-cyan);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0% { opacity: 0.5; box-shadow: 0 0 5px var(--accent-cyan); }
            50% { opacity: 1; box-shadow: 0 0 15px var(--accent-cyan); }
            100% { opacity: 0.5; box-shadow: 0 0 5px var(--accent-cyan); }
        }

        /* Event List Container */
        .event-feed {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }

        /* Individual Event Cards */
        .event-card {
            background: rgba(15, 20, 30, 0.8);
            border: 1px solid rgba(255,255,255,0.05);
            border-left: 4px solid var(--text-muted);
            border-radius: 8px;
            padding: 12px 16px;
            transition: all 0.3s ease;
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px) scale(0.98); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }

        .event-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Status Modifiers for Cards */
        .event-card.safe {
            border-left-color: var(--accent-green);
        }

        .event-card.malicious {
            border-left-color: var(--alert-red);
            background: rgba(255, 42, 42, 0.05);
            border: 1px solid rgba(255, 42, 42, 0.2);
            border-left: 4px solid var(--alert-red);
            box-shadow: inset 0 0 20px rgba(255, 42, 42, 0.05), 0 0 15px var(--alert-glow);
            animation: slideIn 0.4s ease-out, threat-pulse 2s infinite;
        }

        @keyframes threat-pulse {
            0% { box-shadow: 0 0 5px var(--alert-glow); }
            50% { box-shadow: 0 0 25px var(--alert-glow); }
            100% { box-shadow: 0 0 5px var(--alert-glow); }
        }

        /* Card Content */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
        }

        .pid-badge {
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 4px;
            color: white;
            font-weight: 600;
        }

        .status-badge {
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .safe .status-badge { background: rgba(0, 255, 136, 0.1); color: var(--accent-green); }
        .malicious .status-badge { background: rgba(255, 42, 42, 0.15); color: var(--alert-red); }

        .syscall-trace {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Statistics Boxes */
        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-box:hover { background: rgba(255,255,255,0.03); }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
        }

        .val-safe { color: var(--accent-green); text-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }
        .val-alert { color: var(--alert-red); text-shadow: 0 0 20px var(--alert-glow); }

        /* System Status Header */
        .sys-status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 1.5rem;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .status-indicator {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
        }

    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <header>
        <h1>IDS Neural Engine</h1>
        <div class="subtitle">REAL-TIME SYSTEM CALL INTRUSION MONITORING</div>
    </header>

    <div class="dashboard-container">
        <!-- Live Feed Panel -->
        <div class="glass-panel left-panel">
            <div class="panel-title">
                <div class="pulse"></div> Live Kernel Traces
            </div>
            <div class="event-feed" id="eventList">
                <!-- Data injected via JS -->
            </div>
        </div>

        <!-- Analytics Panel -->
        <div class="right-panel">
            <div class="glass-panel" style="padding: 1.5rem;">
                <div class="panel-title">System Status</div>
                <div class="sys-status-container">
                    <div class="pulse" id="sysPulse" style="width:12px; height:12px;"></div>
                    <div class="status-indicator" id="sysStatus" style="color:var(--text-muted)">CONNECTING...</div>
                </div>
            </div>

            <div class="glass-panel" style="flex: 1; justify-content: space-evenly;">
                <div class="panel-title">Threat Analytics</div>
                
                <div class="stat-box">
                    <div class="stat-label">Secure Processes</div>
                    <div class="stat-value val-safe" id="safeCount">0</div>
                </div>

                <div class="stat-box" style="border-color: rgba(255,42,42,0.3); background: rgba(255,42,42,0.03);">
                    <div class="stat-label" style="color: var(--alert-red)">Anomalies Detected</div>
                    <div class="stat-value val-alert" id="maliciousCount">0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Track rendered events to avoid re-rendering entire list
        const renderedPids = new Set();
        let firstLoad = true;
        
        // Counter Animation Function
        function animateValue(obj, start, end, duration) {
            if(start === end) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        async function fetchDashboardData() {
            try {
                // Fetch Stats
                const statRes = await fetch('/api/stats');
                const statData = await statRes.json();
                const evtRes = await fetch('/api/events');
                const events = await evtRes.json();
                
                // --- Render Logic ---
                const safeEl = document.getElementById('safeCount');
                const alertEl = document.getElementById('maliciousCount');
                
                // Animate if values changed
                if(parseInt(safeEl.innerText) !== statData.safe) {
                    animateValue(safeEl, parseInt(safeEl.innerText) || 0, statData.safe, 500);
                }
                if(parseInt(alertEl.innerText) !== statData.malicious) {
                    animateValue(alertEl, parseInt(alertEl.innerText) || 0, statData.malicious, 500);
                }
                
                // Update System Status
                const sysStatus = document.getElementById('sysStatus');
                const sysPulse = document.getElementById('sysPulse');
                
                if(statData.status.includes("ACTIVE")) {
                    sysStatus.innerText = statData.status;
                    sysStatus.style.color = "var(--accent-cyan)";
                    sysPulse.style.background = "var(--accent-cyan)";
                    sysPulse.style.boxShadow = "0 0 15px var(--accent-cyan)";
                } else {
                    sysStatus.innerText = statData.status;
                    sysStatus.style.color = "var(--alert-red)";
                    sysPulse.style.background = "var(--alert-red)";
                    sysPulse.style.boxShadow = "0 0 15px var(--alert-red)";
                }

                // Render Events
                const list = document.getElementById('eventList');
                if(firstLoad) { list.innerHTML = ""; firstLoad = false; }

                list.innerHTML = "";
                events.forEach(evt => {
                    const card = document.createElement('div');
                    card.className = `event-card ${evt.status.toLowerCase()}`;
                    
                    const isMalicious = evt.status === "MALICIOUS";
                    const statusText = isMalicious ? "THREAT DETECTED" : "NORMAL";
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <div>
                                <span style="color:var(--text-muted)">[${evt.timestamp.split(' ')[1] || evt.timestamp}]</span> 
                                <span class="pid-badge">PID: ${evt.pid}</span>
                            </div>
                            <div class="status-badge">${statusText} - ${evt.confidence}%</div>
                        </div>
                        <div class="syscall-trace">
                            <span style="color:${isMalicious ? 'var(--alert-red)' : 'var(--accent-cyan)'}">> sys_call:</span> ${evt.sequence_preview}
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (err) {
                console.error("Connection Error or Offline:", err);
            }
        }

        // Initialize Loop
        setInterval(fetchDashboardData, 1500);
        fetchDashboardData();
    </script>
</body>
</html>
